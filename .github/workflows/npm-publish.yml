name: Publish npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: "npm version to publish, without leading v"
        required: true
      ref:
        description: "Git ref to package from"
        required: false
        default: "main"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Set npm package version
        run: ./scripts/set-version.sh "$VERSION"
        env:
          VERSION: ${{ inputs.version }}

      - name: Publish to npm
        working-directory: npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
